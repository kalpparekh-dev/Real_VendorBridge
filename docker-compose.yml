services:
  postgres:
    image: postgres:16
    container_name: vendorbridge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vendorbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./server
    container_name: vendorbridge-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vendorbridge?schema=public
      JWT_SECRET: vendorbridge-dev-secret-change-in-production
      JWT_REFRESH_SECRET: vendorbridge-refresh-secret-change-in-production
      PORT: 5000
      NODE_ENV: development
    ports:
      - "5000:5000"

  frontend:
    build: ./client
    container_name: vendorbridge-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data: